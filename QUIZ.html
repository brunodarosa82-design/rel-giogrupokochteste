<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz — Controle de Ponto</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: #071d42;
  min-height: 100vh;
  display: flex;
  align-items: flex-start;
  justify-content: center;
  padding: 2rem 1rem 4rem;
}

#app { width: 100%; max-width: 620px; }

/* ── Header ── */
.header {
  text-align: center;
  padding: 2rem 1rem 1.5rem;
}
.logo {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  background: #c8102e;
  color: white;
  padding: 10px 26px;
  border-radius: 14px;
  font-size: 20px;
  font-weight: 700;
  letter-spacing: -0.02em;
  margin-bottom: 10px;
  box-shadow: none;
}
.subtitle { color: rgba(255,255,255,0.45); font-size: 13px; }

/* ── Step indicators ── */
.steps-row {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 0;
  margin: 1.6rem 0 1.4rem;
  padding: 0 0.5rem;
  overflow-x: auto;
}
.step-dot {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  border: 2px solid rgba(255,255,255,0.18);
  background: #0d3270;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 11px;
  font-weight: 700;
  color: rgba(255,255,255,0.3);
  flex-shrink: 0;
  transition: all 0.3s;
  position: relative;
  z-index: 1;
}
.step-dot.done {
  background: #c8102e;
  border-color: #c8102e;
  color: white;
}
.step-dot.active {
  background: #0d3270;
  border-color: #c8102e;
  color: #c8102e;
  box-shadow: 0 0 0 4px rgba(200,16,46,0.2);
}
.step-line {
  flex: 1;
  height: 2px;
  background: rgba(255,255,255,0.12);
  min-width: 8px;
  max-width: 32px;
  transition: background 0.3s;
}
.step-line.done { background: #c8102e; }

/* ── Progress label ── */
.progress-label {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 1rem;
  font-size: 13px;
  color: rgba(255,255,255,0.35);
}
.timer-pill {
  background: rgba(255,255,255,0.06);
  color: #f5c518;
  font-weight: 700;
  font-size: 13px;
  padding: 4px 12px;
  border-radius: 99px;
  border: 1.5px solid rgba(255,255,255,0.18);
  transition: all 0.3s;
}
.timer-pill.warn {
  background: #fff0eb;
  color: #D85A30;
  border-color: #f5bfaa;
}

/* ── Card ── */
.question-card {
  background: #0d3270;
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 18px;
  padding: 1.8rem 1.6rem;
  box-shadow: 0 4px 24px rgba(0,0,0,0.3);
  animation: fadeUp 0.28s ease;
}
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(10px); }
  to   { opacity: 1; transform: translateY(0); }
}

.q-tag {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.07em;
  text-transform: uppercase;
  color: #c8102e;
  background: #071d42;
  padding: 4px 10px;
  border-radius: 99px;
  margin-bottom: 14px;
}

.question-scenario {
  background: rgba(255,255,255,0.07);
  border-radius: 12px;
  padding: 14px 16px;
  margin-bottom: 16px;
  font-size: 14px;
  color: #555;
  line-height: 1.75;
  border-left: 4px solid #c8102e;
}

.question-ask {
  font-size: 16px;
  font-weight: 600;
  color: #fff;
  margin-bottom: 18px;
  line-height: 1.5;
}

/* ── Options ── */
.options-grid { display: flex; flex-direction: column; gap: 10px; }

.option {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  padding: 14px 16px;
  border: 1.5px solid rgba(255,255,255,0.12);
  border-radius: 12px;
  cursor: pointer;
  transition: background 0.15s, border-color 0.15s, transform 0.1s;
  font-size: 14px;
  line-height: 1.55;
  color: rgba(255,255,255,0.85);
  background: #0d3270;
  text-align: left;
  width: 100%;
}
.option:hover:not(.disabled) {
  background: rgba(255,255,255,0.06);
  border-color: rgba(255,255,255,0.3);
  transform: translateX(2px);
}
.option.correct { background: #EAF3DE; border-color: #639922; color: #27500A; }
.option.wrong   { background: #FCEBEB; border-color: #A32D2D; color: #501313; }
.option.disabled { cursor: default; transform: none; }

.option-letter {
  min-width: 30px;
  height: 30px;
  border-radius: 50%;
  background: #071d42;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  font-weight: 700;
  color: #c8102e;
  flex-shrink: 0;
  margin-top: 1px;
  transition: background 0.15s, color 0.15s;
}
.option.correct .option-letter { background: #639922; color: white; }
.option.wrong   .option-letter { background: #A32D2D; color: white; }

/* ── Feedback ── */
.feedback {
  font-size: 13.5px;
  padding: 14px 16px;
  border-radius: 12px;
  margin-top: 14px;
  display: none;
  line-height: 1.65;
  animation: fadeUp 0.2s ease;
}
.feedback.show { display: block; }
.feedback.ok  { background: #EAF3DE; color: #27500A; border: 1px solid #c0dd97; }
.feedback.err { background: #FCEBEB; color: #501313; border: 1px solid #f09595; }

/* ── Nav button ── */
.nav-row {
  display: flex;
  justify-content: flex-end;
  margin-top: 1rem;
}
.btn {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 11px 24px;
  border-radius: 12px;
  border: none;
  background: #c8102e;
  color: white;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  transition: opacity 0.15s, transform 0.1s;
  box-shadow: 0 3px 12px rgba(200,16,46,0.4);
}
.btn:hover { opacity: 0.88; }
.btn:active { transform: scale(0.97); }
.btn.center { margin: 0 auto; }

/* ── Result ── */
.result-card {
  text-align: center;
  padding: 2.5rem 1.5rem;
  animation: fadeUp 0.3s ease;
}
.score-circle {
  width: 120px;
  height: 120px;
  border-radius: 50%;
  margin: 0 auto 1.2rem;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  border: 5px solid #c8102e;
  background: rgba(255,255,255,0.06);
}
.score-num { font-size: 34px; font-weight: 800; color: #f5c518; }
.score-den { font-size: 13px; color: rgba(255,255,255,0.35); }
.result-title { font-size: 22px; font-weight: 700; margin-bottom: 6px; color: #fff; }
.result-sub   { font-size: 14px; color: rgba(255,255,255,0.5); margin-bottom: 1.4rem; line-height: 1.6; }

.medal {
  display: inline-block;
  padding: 6px 20px;
  border-radius: 99px;
  font-size: 14px;
  font-weight: 700;
  margin-bottom: 1.4rem;
}
.medal-gold   { background: #FAEEDA; color: #633806; }
.medal-silver { background: #e8e7e3; color: #444; }
.medal-bronze { background: #F5C4B3; color: #712B13; }
.medal-red    { background: #FCEBEB; color: #A32D2D; }

.tip {
  background: rgba(255,255,255,0.07);
  border-radius: 12px;
  padding: 14px 16px;
  font-size: 13px;
  color: rgba(255,255,255,0.5);
  line-height: 1.7;
  border-left: 4px solid #c8102e;
  margin-top: 1.4rem;
  text-align: left;
}

/* Koch header styles */
.header { background: #0d3270; border-radius: 16px; padding: 1.6rem 1rem 1.2rem; margin-bottom: 1.2rem; border: 1px solid rgba(255,255,255,0.1); }
.header-title { font-size: 13px; font-weight: 800; color: #fff; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 4px; }
.slogan { font-size: 18px; font-weight: 900; color: #f5c518; text-transform: uppercase; letter-spacing: 0.04em; line-height: 1.2; margin-bottom: 6px; }
.subtitle { color: rgba(255,255,255,0.4); font-size: 12px; }
/* fix option text */
.option span:last-child { color: rgba(255,255,255,0.82); }
.option.correct span:last-child { color: #27500A; }
.option.wrong span:last-child { color: #501313; }
/* fix option letter on hover */
.option:hover:not(.disabled) .option-letter { color: #c8102e; }
/* feedback text */
.feedback.ok { color: #27500A; }
.feedback.err { color: #501313; }
/* result card */
.result-card .tip { color: rgba(255,255,255,0.6); }
.score-den { color: rgba(255,255,255,0.4); }
.result-title { color: #fff; }
.result-sub { color: rgba(255,255,255,0.6); }
/* q-tag */
.q-tag { background: rgba(200,16,46,0.15); color: #f5c518; border: 1px solid rgba(200,16,46,0.3); }
/* scenario */
.question-scenario { background: rgba(255,255,255,0.05); border-left-color: #c8102e; color: rgba(255,255,255,0.7); }
/* step dot active white bg */
.step-dot.active { background: #0d3270; border-color: #c8102e; color: #f5c518; }
.step-dot.done { background: #c8102e; border-color: #c8102e; color: #fff; }
/* nav row */
.nav-row .btn { background: #c8102e; }
.result-card .btn { background: #c8102e; }
/* reset btn */
.reset-btn { color: rgba(255,255,255,0.35); border-color: rgba(255,255,255,0.12); background: none; }
/* timer pill warn */
.timer-pill { background: rgba(245,197,24,0.12); color: #f5c518; border-color: rgba(245,197,24,0.3); }
.timer-pill.warn { background: rgba(200,16,46,0.15); color: #ff6b6b; border-color: rgba(200,16,46,0.4); }
/* score circle */
.score-circle { border-color: #c8102e; background: rgba(200,16,46,0.1); }
.score-num { color: #f5c518; }
/* progress label text */
.progress-label { color: rgba(255,255,255,0.4); }

const LETTERS = ['A','B','C','D'];
let current = 0, score = 0, answered = false, timer = null, timeLeft = 20;

function $(id) { return document.getElementById(id); }

/* ── Steps ── */
function renderSteps() {
  const n = QUESTIONS.length;
  let html = '<div class="steps-row">';
  for (let i = 0; i < n; i++) {
    const cls = i < current ? 'done' : i === current ? 'active' : '';
    html += `<div class="step-dot ${cls}">${i < current ? '✓' : i + 1}</div>`;
    if (i < n - 1) {
      html += `<div class="step-line ${i < current ? 'done' : ''}"></div>`;
    }
  }
  html += '</div>';
  $('steps-area').innerHTML = html;
}

/* ── Timer ── */
function startTimer() {
  clearInterval(timer);
  timeLeft = 20;
  updateTimer();
  timer = setInterval(() => {
    timeLeft--;
    updateTimer();
    if (timeLeft <= 0) { clearInterval(timer); autoSkip(); }
  }, 1000);
}

function updateTimer() {
  const el = $('timer-val');
  if (!el) return;
  el.textContent = timeLeft + 's';
  el.className = 'timer-pill' + (timeLeft <= 5 ? ' warn' : '');
}

function autoSkip() {
  if (!answered) {
    answered = true;
    highlightOptions(-1);
    showFeedback(false, QUESTIONS[current].explanation);
    $('next-btn').style.display = 'inline-flex';
  }
}

/* ── Interaction ── */
function highlightOptions(chosen) {
  const q = QUESTIONS[current];
  q.options.forEach((_, i) => {
    const el = $('opt-' + i);
    if (!el) return;
    el.classList.add('disabled');
    if (i === q.correct) el.classList.add('correct');
    else if (i === chosen && chosen !== q.correct) el.classList.add('wrong');
  });
}

function showFeedback(ok, text) {
  const fb = $('feedback');
  if (!fb) return;
  fb.textContent = ok ? "✓ Correto!" : "✗ Incorreto.";
  fb.className = 'feedback show ' + (ok ? 'ok' : 'err');
}

function choose(i) {
  if (answered) return;
  answered = true;
  clearInterval(timer);
  const ok = i === QUESTIONS[current].correct;
  if (ok) score++;
  highlightOptions(i);
  showFeedback(ok, QUESTIONS[current].explanation);
  $('next-btn').style.display = 'inline-flex';
}

/* ── Render question ── */
function renderQuestion() {
  answered = false;
  const q = QUESTIONS[current];

  renderSteps();

  let opts = q.options.map((o, i) => `
    <button class="option" id="opt-${i}" onclick="choose(${i})">
      <span class="option-letter">${LETTERS[i]}</span>
      <span>${o}</span>
    </button>`).join('');

  $('quiz-area').innerHTML = `
    <div class="progress-label">
      <span>Questão ${current + 1} de ${QUESTIONS.length}</span>
      <span id="timer-val" class="timer-pill">${timeLeft}s</span>
    </div>
    <div class="question-card">
      <div class="q-tag">⏱ Questão ${current + 1}</div>
      ${q.scenario ? `<div class="question-scenario">${q.scenario}</div>` : ''}
      <div class="question-ask">${q.ask}</div>
      <div class="options-grid">${opts}</div>
      <div id="feedback" class="feedback"></div>
    </div>
    <div class="nav-row">
      <button class="btn" id="next-btn" style="display:none;" onclick="nextQuestion()">
        ${current + 1 < QUESTIONS.length ? 'Próxima →' : 'Ver resultado 🏆'}
      </button>
    </div>`;

  document.querySelectorAll('.option').forEach((el, i) => {
    el.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') choose(i); });
  });

  startTimer();
}

function nextQuestion() {
  current++;
  if (current >= QUESTIONS.length) { showResult(); return; }
  renderQuestion();
}

/* ── Result ── */
function showResult() {
  clearInterval(timer);
  const pct = Math.round((score / QUESTIONS.length) * 100);
  let medalClass, medalText, msg;
  if (pct >= 90)      { medalClass = 'medal-gold';   medalText = '🏆 Ouro';             msg = 'Excelente! Você domina a legislação de ponto!'; }
  else if (pct >= 70) { medalClass = 'medal-silver';  medalText = '🥈 Prata';            msg = 'Muito bem! Revise os pontos que errou.'; }
  else if (pct >= 50) { medalClass = 'medal-bronze';  medalText = '🥉 Bronze';           msg = 'Bom começo. Vale rever o material!'; }
  else                { medalClass = 'medal-red';     medalText = '📚 Continue estudando'; msg = 'Atenção: revise o conteúdo sobre controle de ponto.'; }

  $('steps-area').innerHTML = '';
  $('quiz-area').innerHTML = `
    <div class="question-card result-card">
      <div class="score-circle">
        <span class="score-num">${score}</span>
        <span class="score-den">de ${QUESTIONS.length}</span>
      </div>
      <div class="result-title">${pct}% de acerto</div>
      <div class="result-sub">${msg}</div>
      <div><span class="medal ${medalClass}">${medalText}</span></div>
      <div class="tip">💡 Demandas operacionais não substituem o cumprimento da legislação trabalhista. O respeito à jornada, intervalos e descansos protege o colaborador, a liderança e a empresa.</div>
      <br>
      <button class="btn center" onclick="restart()">↺ Refazer quiz</button>
    </div>`;
}

function restart() { current = 0; score = 0; renderQuestion(); }

renderQuestion();
</script>
